spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:bookdb-test;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  elasticsearch:
    uris: http://localhost:9201
eureka:
  client:
    enabled: false