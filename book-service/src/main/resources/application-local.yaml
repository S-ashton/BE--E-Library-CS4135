spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/bookdb
    username: ${DB_USERNAME:elibrary}
    password: ${DB_PASSWORD:elibrary-dev-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  elasticsearch:
    uris: http://localhost:9200

server:
  port: 8082

eureka:
  client:
    enabled: false

app:
  minio:
    endpoint: http://localhost:9000
    public-url: http://localhost:9000
    access-key: ${MINIO_USER:elibrary}
    secret-key: ${MINIO_PASSWORD:elibrary-dev-password}
    bucket: ${MINIO_BUCKET:book-covers}
