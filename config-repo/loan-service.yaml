server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/loandb
    username: ${DB_USERNAME:elibrary}
    password: ${DB_PASSWORD:elibrary-dev-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

services:
  book:
    base-url: ${BOOK_SERVICE_BASE_URL:http://localhost:8082}

loan:
  events:
    exchange: loan.events
    borrowed-routing-key: loan.borrowed
    returned-routing-key: loan.returned