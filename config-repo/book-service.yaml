server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:elibrary_book
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

loan:
  events:
    exchange: loan.events
    borrowed-routing-key: loan.borrowed
    returned-routing-key: loan.returned
book:
  events:
    exchange: book.events
    added-routing-key: book.added