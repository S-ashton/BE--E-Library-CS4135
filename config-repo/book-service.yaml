server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/bookdb
    username: ${DB_USERNAME:elibrary}
    password: ${DB_PASSWORD:elibrary-dev-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:-elibrary}
    password: ${RABBITMQ_PASSWORD:-elibrary-dev-password}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    public-url: ${MINIO_PUBLIC_URL:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:elibrary}
    secret-key: ${MINIO_SECRET_KEY:elibrary-dev-password}
    bucket: ${MINIO_BUCKET:book-covers}

loan:
  events:
    exchange: loan.events
    borrowed-routing-key: loan.borrowed
    returned-routing-key: loan.returned
    borrowed-queue: book-service.loan.borrowed
    returned-queue: book-service.loan.returned
book:
  events:
    exchange: book.events
    added-routing-key: book.added
    deleted-routing-key: book.deleted

services:
  loan:
    base-url: ${LOAN_SERVICE_BASE_URL:http://loan-service:8083}
