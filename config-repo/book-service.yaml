server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:elibrary_book
    driver-class-name: org.h2.Driver

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info