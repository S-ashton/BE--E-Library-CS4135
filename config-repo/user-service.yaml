server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/userdb
    username: ${DB_USERNAME:elibrary}
    password: ${DB_PASSWORD:elibrary-dev-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-jwt-secret-do-not-use-in-production-must-be-at-least-256-bits}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}
    issuer: ${APP_JWT_ISSUER:elibrary-user-service}

user:
  events:
    exchange: user.events
    deleted-routing-key: user.deleted
    email-updated-routing-key: user.email.updated