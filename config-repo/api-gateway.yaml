server:
  port: 8080

spring:
  http:
    codecs:
      log-request-details: false
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - ${APP_FRONTEND_ORIGIN:http://localhost:3000}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - "*"
                allow-credentials: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**,/api/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: user-service
                    fallbackUri: forward:/fallback

            - id: book-service
              uri: lb://book-service
              predicates:
                - Path=/api/books/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: book-service
                    fallbackUri: forward:/fallback

            - id: loan-service
              uri: lb://loan-service
              predicates:
                - Path=/api/loans/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: loan-service
                    fallbackUri: forward:/fallback

            - id: recommendation-service
              uri: lb://recommendation-service
              predicates:
                - Path=/api/recommendations/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: recommendation-service
                    fallbackUri: forward:/fallback

            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - SetPath=/v3/api-docs

            - id: book-service-docs
              uri: lb://book-service
              predicates:
                - Path=/v3/api-docs/book-service
              filters:
                - SetPath=/v3/api-docs

            - id: loan-service-docs
              uri: lb://loan-service
              predicates:
                - Path=/v3/api-docs/loan-service
              filters:
                - SetPath=/v3/api-docs

            - id: recommendation-service-docs
              uri: lb://recommendation-service
              predicates:
                - Path=/v3/api-docs/recommendation-service
              filters:
                - SetPath=/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoint:
    gateway:
      access: read_only
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origin: ${APP_FRONTEND_ORIGIN:http://localhost:3000}
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-jwt-secret-do-not-use-in-production-must-be-at-least-256-bits}
    issuer: ${APP_JWT_ISSUER:elibrary-user-service}

resilience4j:
  circuitbreaker:
    instances:
      book-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80
      loan-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80
      user-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80
      recommendation-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: book-service
        url: /v3/api-docs/book-service
      - name: loan-service
        url: /v3/api-docs/loan-service
      - name: recommendation-service
        url: /v3/api-docs/recommendation-service
  api-docs:
    enabled: true