server:
  port: 8080

spring:
  http:
    codecs:
      log-request-details: false
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**,/api/users/**

            - id: book-service
              uri: lb://book-service
              predicates:
                - Path=/api/books/**

            - id: loan-service
              uri: lb://loan-service
              predicates:
                - Path=/api/loans/**

            - id: recommendation-service
              uri: lb://recommendation-service
              predicates:
                - Path=/api/recommendations/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoint:
    gateway:
      access: read_only
  endpoints:
    web:
      exposure:
        include: health,info,gateway

app:
  cors:
    allowed-origin: ${APP_FRONTEND_ORIGIN:http://localhost:3000}
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-jwt-secret-do-not-use-in-production-must-be-at-least-256-bits}
    issuer: ${APP_JWT_ISSUER:elibrary-user-service}