services:

  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-elibrary}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-elibrary-dev-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-elibrary}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - data

  config-server:
    build: ./config-server
    container_name: config-server
    restart: unless-stopped
    volumes:
      - ./config-repo:/config-repo:ro
    environment:
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-elibrary}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-elibrary-dev-password}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - data

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.45"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=elibrary-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.priority=10"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck --ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - public

  # ── Application Services ──────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # HTTP router — works everywhere (local dev + production)
      - "traefik.http.routers.gateway.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.middlewares=redirect-to-https"
      # HTTPS router — production with Let's Encrypt
      - "traefik.http.routers.gateway-secure.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.gateway-secure.entrypoints=websecure"
      - "traefik.http.routers.gateway-secure.tls.certresolver=letsencrypt"
      # HTTP → HTTPS redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      # Backend port
      - "traefik.http.services.gateway.loadbalancer.server.port=8080"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      APP_JWT_SECRET: ${APP_JWT_SECRET:-default-dev-jwt-secret-change-in-production-must-be-at-least-256-bits-long-for-hmac-sha}
      APP_JWT_ISSUER: ${APP_JWT_ISSUER:-elibrary-user-service}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - public
      - internal

  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      APP_JWT_SECRET: ${APP_JWT_SECRET:-default-dev-jwt-secret-change-in-production-must-be-at-least-256-bits-long-for-hmac-sha}
      APP_JWT_ISSUER: ${APP_JWT_ISSUER:-elibrary-user-service}
      APP_JWT_EXPIRATION_SECONDS: ${APP_JWT_EXPIRATION_SECONDS:-3600}
      DB_USERNAME: ${DB_USERNAME:-elibrary}
      DB_PASSWORD: ${DB_PASSWORD:-elibrary-dev-password}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - internal
      - data

  book-service:
    build: ./book-service
    container_name: book-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      DB_USERNAME: ${DB_USERNAME:-elibrary}
      DB_PASSWORD: ${DB_PASSWORD:-elibrary-dev-password}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - internal
      - data

  loan-service:
    build: ./loan-service
    container_name: loan-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      BOOK_SERVICE_BASE_URL: http://book-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-elibrary}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-elibrary-dev-password}
      DB_USERNAME: ${DB_USERNAME:-elibrary}
      DB_PASSWORD: ${DB_PASSWORD:-elibrary-dev-password}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      book-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - internal
      - data

  embedding-service:
    build: ./embedding-service
    container_name: embedding-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - internal

  recommendation-service:
    build: ./recommendation-service
    container_name: recommendation-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      EMBEDDING_SERVICE_URL: http://embedding-service:8000
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      book-service:
        condition: service_healthy
      loan-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - internal

# ── Networks ──────────────────────────────────────────────
# public:   Only the API gateway — sole external entry point
# internal: All services + infrastructure (service mesh)
# data:     Backend services + datastores (databases, message brokers)

networks:
  public:
    name: elibrary-public
    driver: bridge
  internal:
    name: elibrary-internal
    driver: bridge
  data:
    name: elibrary-data
    driver: bridge

volumes:
  pgdata:
  letsencrypt:
