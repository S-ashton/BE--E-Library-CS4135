name:  Loan Service Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  loan-service-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: loan-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test