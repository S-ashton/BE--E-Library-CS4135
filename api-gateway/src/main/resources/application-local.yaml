spring:
  http:
    codecs:
      log-request-details: false
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**,/api/users/**

            - id: book-service
              uri: lb://book-service
              predicates:
                - Path=/api/books/**

            - id: loan-service
              uri: lb://loan-service
              predicates:
                - Path=/api/loans/**

            - id: recommendation-service
              uri: lb://recommendation-service
              predicates:
                - Path=/api/recommendations/**

            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - SetPath=/v3/api-docs

            - id: book-service-docs
              uri: lb://book-service
              predicates:
                - Path=/v3/api-docs/book-service
              filters:
                - SetPath=/v3/api-docs

            - id: loan-service-docs
              uri: lb://loan-service
              predicates:
                - Path=/v3/api-docs/loan-service
              filters:
                - SetPath=/v3/api-docs

            - id: recommendation-service-docs
              uri: lb://recommendation-service
              predicates:
                - Path=/v3/api-docs/recommendation-service
              filters:
                - SetPath=/v3/api-docs

server:
  port: 8080

eureka:
  client:
    enabled: false

management:
  endpoint:
    gateway:
      access: read_only
  endpoints:
    web:
      exposure:
        include: health,info,gateway

app:
  cors:
    allowed-origin: ${APP_FRONTEND_ORIGIN}
  jwt:
    secret: ${APP_JWT_SECRET}
    issuer: ${APP_JWT_ISSUER:elibrary-user-service}

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: book-service
        url: /v3/api-docs/book-service
      - name: loan-service
        url: /v3/api-docs/loan-service
      - name: recommendation-service
        url: /v3/api-docs/recommendation-service
  api-docs:
    enabled: true
