spring:
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/v1/auth/**,/api/users/**
            - id: book-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/books/**
            - id: loan-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/loans/**
            - id: recommendation-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/recommendations/**

eureka:
  client:
    enabled: false

server:
  port: 0
