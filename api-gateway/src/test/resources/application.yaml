spring:
  http:
    codecs:
      log-request-details: false
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/auth/**,/api/users/**
            - id: book-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/books/**
            - id: loan-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/loans/**
            - id: recommendation-service
              uri: http://localhost:9999
              predicates:
                - Path=/api/recommendations/**

eureka:
  client:
    enabled: false

server:
  port: 0

app:
  cors:
    allowed-origin: ${APP_FRONTEND_ORIGIN:http://localhost:5173}
  jwt:
    secret: test-jwt-secret-for-api-gateway-only-1234567890
    issuer: user-service-test
