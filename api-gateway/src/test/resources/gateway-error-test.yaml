spring:
  http:
    codecs:
      log-request-details: false
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          httpclient:
            response-timeout: 100ms
          routes:
            - id: book-service
              uri: http://localhost:${test.downstream.unavailable-port}
              predicates:
                - Path=/api/books/**
            - id: recommendation-service
              uri: http://localhost:${test.downstream.slow-port}
              predicates:
                - Path=/api/recommendations/**

eureka:
  client:
    enabled: false

server:
  port: 0

app:
  cors:
    allowed-origin: http://localhost:3000
  jwt:
    secret: test-jwt-secret-for-api-gateway-only-1234567890
    issuer: user-service-test
