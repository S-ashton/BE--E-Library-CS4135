spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:userdb-test
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
eureka:
  client:
    enabled: false
app:
  jwt:
    secret: test-jwt-secret-for-user-service-only-1234567890
    expiration-seconds: 3600
    issuer: user-service-test
    refresh-expiration-seconds: 1209600
    refresh-cookie-name: refreshToken
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: Lax
    refresh-cookie-secure: false
